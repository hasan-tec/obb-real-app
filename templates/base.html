<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OBB Curation Engine{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3348;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #7b73ff;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --pink: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .sidebar-brand h2 {
            font-size: 18px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-brand small {
            display: block;
            color: var(--text-dim);
            font-size: 11px;
            margin-top: 4px;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-dim);
            font-size: 14px;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .sidebar nav a:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .sidebar nav a.active {
            background: var(--surface2);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .sidebar nav a .icon {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        /* ─── Main Content ─── */
        .main {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .topbar .status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .topbar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.green {
            background: var(--green);
        }

        .dot.yellow {
            background: var(--yellow);
        }

        .dot.red {
            background: var(--red);
        }

        .content {
            padding: 24px 30px;
        }

        /* ─── Cards & Stats ─── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card .sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ─── Tables ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(108, 99, 255, 0.04);
        }

        /* ─── Badges ─── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-green {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .badge-yellow {
            background: rgba(245, 158, 11, 0.15);
            color: var(--yellow);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
        }

        .badge-blue {
            background: rgba(59, 130, 246, 0.15);
            color: var(--blue);
        }

        .badge-purple {
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
        }

        .badge-dim {
            background: var(--surface2);
            color: var(--text-dim);
        }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-danger {
            background: var(--red);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        /* ─── Forms ─── */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        select.form-control {
            appearance: auto;
        }

        /* ─── Grid layouts ─── */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        /* ─── Code / JSON ─── */
        .json-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--text-dim);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
        }

        /* ─── Empty state ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 14px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ─── Alert ─── */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--green);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--blue);
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .sidebar nav a span {
                display: none;
            }

            .sidebar-brand h2 span {
                display: none;
            }

            .sidebar-brand small {
                display: none;
            }

            .main {
                margin-left: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>🍼 <span>OBB Engine</span></h2>
            <small>Curation Engine v1.0</small>
        </div>
        <nav>
            <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">
                <span class="icon">📊</span> <span>Dashboard</span>
            </a>
            <a href="/webhooks" class="{% if page == 'webhooks' %}active{% endif %}">
                <span class="icon">🔗</span> <span>Webhooks</span>
            </a>
            <a href="/customers" class="{% if page == 'customers' %}active{% endif %}">
                <span class="icon">👥</span> <span>Customers</span>
            </a>
            <a href="/decisions" class="{% if page == 'decisions' %}active{% endif %}">
                <span class="icon">✅</span> <span>Decisions</span>
            </a>
            <a href="/kits" class="{% if page == 'kits' %}active{% endif %}">
                <span class="icon">📦</span> <span>Kits</span>
            </a>
            <a href="/items" class="{% if page == 'items' %}active{% endif %}">
                <span class="icon">🏷️</span> <span>Items</span>
            </a>
            <a href="/item-alternatives" class="{% if page == 'item-alternatives' %}active{% endif %}">
                <span class="icon">🔗</span> <span>Alternatives</span>
            </a>
            <a href="/curation-report" class="{% if page == 'curation-report' %}active{% endif %}">
                <span class="icon">📊</span> <span>Curation Report</span>
            </a>
            <a href="/forward-planner" class="{% if page == 'forward-planner' %}active{% endif %}">
                <span class="icon">📈</span> <span>Forward Planner</span>
            </a>
            <a href="/activity" class="{% if page == 'activity' %}active{% endif %}">
                <span class="icon">📋</span> <span>Activity</span>
            </a>
            <a href="/settings" class="{% if page == 'settings' %}active{% endif %}">
                <span class="icon">⚙️</span> <span>Settings</span>
            </a>
            <a href="/flow-diagram" class="{% if page == 'flow-diagram' %}active{% endif %}">
                <span class="icon">🗺️</span> <span>Flow Diagram</span>
            </a>
        </nav>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
